<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=0.35, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
  <title>Loader — Decrypting...</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060608;--surface:#0e0e12;--surface2:#13131a;--border:#1e1e2e;--border2:#2a2a3e;--accent:#00ff88;--accent2:#00cc6a;--accent-dim:rgba(0,255,136,0.07);--text:#eeeef2;--text2:#7a7a9a;--text3:#44445a;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
    body{background:var(--bg);color:var(--text);font-family:var(--sans,sans-serif);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
    body::after{content:'';position:fixed;top:-300px;left:50%;transform:translateX(-50%);width:900px;height:700px;background:radial-gradient(ellipse,rgba(0,255,136,0.08) 0%,rgba(0,180,80,0.03) 40%,transparent 70%);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:40px 24px}
    .icon-wrap{text-align:center;margin-bottom:32px;position:relative}
    .icon-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border:1px solid rgba(0,255,136,0.2);border-radius:50%;animation:ring-pulse 3s ease-in-out infinite}
    .icon-ring:nth-child(2){width:110px;height:110px;border-color:rgba(0,255,136,0.08);animation-delay:0.6s}
    @keyframes ring-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.08);opacity:0.4}}
    .lock-svg{display:inline-block;animation:bob 3.5s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(0,255,136,0.5));position:relative;z-index:1}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}30%{transform:translateY(-5px) rotate(-1deg)}70%{transform:translateY(-2px) rotate(1deg)}}
    h1{font-family:var(--sans,sans-serif);font-weight:800;font-size:28px;text-align:center;margin-bottom:6px;letter-spacing:-0.5px;line-height:1}
    h1 span{color:var(--accent);text-shadow:0 0 24px rgba(0,255,136,0.4)}
    .sub{font-family:var(--mono,monospace);font-size:10px;color:var(--text3);text-align:center;letter-spacing:.15em;text-transform:uppercase;margin-bottom:32px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 28px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);opacity:0;transition:opacity .4s}
    .card:focus-within::before{opacity:1}
    .card:focus-within{border-color:rgba(0,255,136,0.2);box-shadow:0 0 30px rgba(0,255,136,0.05)}
    .lbl{font-family:var(--mono,monospace);font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .lbl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
    .pw-wrap{position:relative}
    .pw-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:13px 46px 13px 14px;font-family:var(--mono,monospace);font-size:14px;color:var(--text);outline:none;transition:border-color .25s,box-shadow .25s;letter-spacing:.08em}
    .pw-input::placeholder{color:var(--text3)}
    .pw-input:focus{border-color:rgba(0,255,136,0.5);box-shadow:0 0 0 3px rgba(0,255,136,0.06),0 0 20px rgba(0,255,136,0.05)}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;transition:color .2s}
    .pw-toggle:hover{color:var(--accent)}
    .btn{width:100%;padding:15px;background:var(--accent);color:#000;border:none;border-radius:6px;font-family:var(--sans,sans-serif);font-weight:700;font-size:13px;letter-spacing:.1em;cursor:pointer;transition:all .25s cubic-bezier(0.4,0,0.2,1);text-transform:uppercase;position:relative;overflow:hidden;margin-top:8px;box-shadow:0 0 24px rgba(0,255,136,0.2),0 4px 16px rgba(0,0,0,0.4)}
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);transform:translateX(-100%) skewX(-15deg);transition:transform .5s cubic-bezier(0.4,0,0.2,1)}
    .btn:hover::before{transform:translateX(100%) skewX(-15deg)}
    .btn:hover{background:#1aff99;box-shadow:0 0 40px rgba(0,255,136,0.4),0 6px 24px rgba(0,0,0,0.4);transform:translateY(-1px)}
    .btn:active{transform:scale(0.98)}
    .btn:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;box-shadow:none}
    .prog-area{display:none;margin-top:16px;padding:18px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}
    .prog-area.active{display:block;animation:fade-in 0.3s ease}
    @keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .prog-header{display:flex;justify-content:space-between;margin-bottom:8px}
    .prog-status{font-family:var(--mono,monospace);font-size:10px;color:var(--text2);letter-spacing:.05em}
    .prog-pct{font-family:var(--mono,monospace);font-size:10px;color:var(--accent);font-weight:700;text-shadow:0 0 10px rgba(0,255,136,0.5)}
    .prog-track{height:5px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;transition:width .35s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 12px rgba(0,255,136,0.6),0 0 4px rgba(0,255,136,0.9);border-radius:3px;position:relative}
    .prog-fill::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:7px;height:7px;background:white;border-radius:50%;box-shadow:0 0 8px rgba(0,255,136,1);opacity:0.8}
    .err{margin-top:14px;padding:12px 16px;background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.2);border-radius:6px;font-family:var(--mono,monospace);font-size:11px;color:#ff7090;display:none;animation:fade-in 0.3s ease}
    .err.show{display:block}
    #output-frame{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:9999;background:transparent}
    @media screen and (max-width:768px){
      .wrap{transform:scale(2.2);transform-origin:top center;margin-top:60px}
    }
    @media screen and (max-width:480px){
      .wrap{transform:scale(2.6);transform-origin:top center;margin-top:80px}
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<iframe id="output-frame"></iframe>

<div class="wrap" id="main-ui">
  <div class="icon-wrap">
    <div class="icon-ring"></div>
    <div class="icon-ring"></div>
    <svg class="lock-svg" width="52" height="52" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="18" width="24" height="18" rx="3" fill="#00ff88" fill-opacity="0.12" stroke="#00ff88" stroke-width="1.5"/>
      <path d="M13 18V13a7 7 0 0114 0v5" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="20" cy="27" r="2.5" fill="#00ff88"/>
      <line x1="20" y1="29.5" x2="20" y2="32" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Membuka <span>Kunci</span></h1>
  <p class="sub">AES-256-CBC · PBKDF2 · HMAC-SHA256</p>

  <div class="card">
    <div class="lbl">passphrase</div>
    <div class="pw-wrap">
      <input type="password" class="pw-input" id="pw" placeholder="Masukkan password enkripsi..." autocomplete="current-password">
      <button class="pw-toggle" id="pwBtn" type="button">
        <svg id="eyeIco" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn" id="decryptBtn">Decrypt &amp; Render</button>

  <div class="prog-area" id="progArea">
    <div class="prog-header">
      <span class="prog-status" id="progStatus">Initializing...</span>
      <span class="prog-pct" id="progPct">0%</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progFill"></div>
    </div>
  </div>

  <div class="err" id="errBox"></div>
</div>

<script>
(function(){
  var PASSWORD_EMBEDDED = "10101010101010110101011010101";

  var pw       = document.getElementById('pw');
  var pwBtn    = document.getElementById('pwBtn');
  var eyeIco   = document.getElementById('eyeIco');
  var decBtn   = document.getElementById('decryptBtn');
  var progArea = document.getElementById('progArea');
  var progSt   = document.getElementById('progStatus');
  var progPct  = document.getElementById('progPct');
  var progFill = document.getElementById('progFill');
  var errBox   = document.getElementById('errBox');
  var frame    = document.getElementById('output-frame');
  var mainUI   = document.getElementById('main-ui');

  // If password is embedded, hide the input and auto-decrypt
  if (PASSWORD_EMBEDDED) {
    document.querySelector('.card').style.display = 'none';
    decryptFlow(PASSWORD_EMBEDDED);
  }

  pwBtn.addEventListener('click', function(){
    var h = pw.type === 'password';
    pw.type = h ? 'text' : 'password';
    eyeIco.innerHTML = h
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  decBtn.addEventListener('click', function(){
    var pass = pw.value.trim();
    if (!pass) { showErr('Masukkan password terlebih dahulu.'); return; }
    decryptFlow(pass);
  });

  function setP(pct, st){
    progFill.style.width = pct + '%';
    progPct.textContent  = pct + '%';
    progSt.textContent   = st;
  }

  function showErr(msg){
    errBox.textContent = '✗ ' + msg;
    errBox.classList.add('show');
    decBtn.disabled = false;
  }

  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  async function decryptFlow(pass){
    decBtn.disabled = true;
    errBox.classList.remove('show');
    progArea.classList.add('active');

    try {
      // Step 1: Fetch encrypted.enc
      setP(10, 'Loading encrypted.enc...');
      var resp = await fetch('encrypted.enc');
      if (!resp.ok) throw new Error('Tidak dapat memuat encrypted.enc (HTTP ' + resp.status + ')');
      var rawJson = await resp.text();
      var data = JSON.parse(rawJson);
      if (!data.salt || !data.iv || !data.ciphertext || !data.hmac) throw new Error('Format encrypted.enc tidak valid');
      await sleep(150);

      // Step 2: PBKDF2 key derivation
      setP(25, 'Deriving key via PBKDF2-SHA512...');
      await sleep(80);

      var salt       = CryptoJS.enc.Hex.parse(data.salt);
      var iv         = CryptoJS.enc.Hex.parse(data.iv);
      var ciphertext = CryptoJS.enc.Hex.parse(data.ciphertext);
      var storedHmac = data.hmac;

      var key = await new Promise(function(resolve){
        setTimeout(function(){
          resolve(CryptoJS.PBKDF2(pass, salt, {
            keySize: 256 / 32,
            iterations: 100000,
            hasher: CryptoJS.algo.SHA512
          }));
        }, 50);
      });

      setP(65, 'Key derived');
      await sleep(80);

      // Step 3: Verify HMAC
      setP(72, 'Verifying HMAC-SHA256 integrity...');
      await sleep(60);

      var dataToAuth  = iv.clone().concat(ciphertext);
      var computedHmac = CryptoJS.HmacSHA256(dataToAuth, key).toString(CryptoJS.enc.Hex);
      if (computedHmac !== storedHmac) throw new Error('HMAC mismatch — password salah atau file rusak');

      setP(80, 'Integrity verified');
      await sleep(60);

      // Step 4: AES Decrypt
      setP(88, 'Decrypting AES-256-CBC...');
      await sleep(80);

      var decrypted = CryptoJS.AES.decrypt(
        { ciphertext: ciphertext },
        key,
        { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
      );

      var html = decrypted.toString(CryptoJS.enc.Utf8);
      if (!html) throw new Error('Dekripsi gagal — password salah atau data korup');

      setP(100, 'Done — rendering page...');
      await sleep(200);

      // === LAYER 1: Patch base URL + viewport ===
      var baseUrl = window.location.href.replace(/\/[^/]*$/, '/');
      var htmlPatched = html
        .replace(/<head([^>]*)>/i, '<head$1><base href="' + baseUrl + '">')
        .replace(
          /<meta\s+name=["']viewport["'][^>]*>/i,
          '<meta name="viewport" content="width=1280, initial-scale=0.35, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">'
        );

      // === LAYER 2: XOR obfuscate source sebelum masuk ke iframe ===
      // Ini menyebabkan source yang terlihat di DevTools adalah garbled XOR bytes,
      // bukan plain HTML. Key di-derive dari timestamp + random agar beda tiap session.
      var xorKey = [];
      var _ks = (Date.now() ^ 0xDEAD) + Math.floor(Math.random() * 0xFFFF);
      for (var _ki = 0; _ki < 64; _ki++) {
        _ks = (_ks * 1664525 + 1013904223) & 0xFFFFFFFF;
        xorKey.push(_ks & 0xFF);
      }
      var enc8 = new TextEncoder().encode(htmlPatched);
      var xorBuf = new Uint8Array(enc8.length);
      for (var _xi = 0; _xi < enc8.length; _xi++) {
        xorBuf[_xi] = enc8[_xi] ^ xorKey[_xi % xorKey.length];
      }

      // === LAYER 3: Split jadi N chunks acak ===
      // Source tidak terlihat utuh di DevTools — tiap chunk hanya potongan XOR bytes
      var CHUNK_COUNT = 7 + Math.floor(Math.random() * 5); // 7–11 chunks
      var chunks = [];
      var chunkSize = Math.ceil(xorBuf.length / CHUNK_COUNT);
      for (var _ci = 0; _ci < CHUNK_COUNT; _ci++) {
        chunks.push(Array.from(xorBuf.slice(_ci * chunkSize, (_ci + 1) * chunkSize)));
      }

      // === LAYER 4: Render via srcdoc + inline assembler script ===
      // Tidak ada blob URL → tidak muncul sebagai file di Sources tab.
      // Assembler script di srcdoc me-reassemble chunks + XOR decode di iframe context.
      var keyJson   = JSON.stringify(xorKey);
      var chunksJson = JSON.stringify(chunks);

      var assemblerScript = [
        '(function(){',
        'var k=' + keyJson + ';',
        'var ch=' + chunksJson + ';',
        'var out=[];',
        'for(var i=0;i<ch.length;i++){',
        '  for(var j=0;j<ch[i].length;j++){',
        '    out.push(ch[i][j]^k[(i*ch[0].length+j)%k.length]);',
        '  }',
        '}',
        'var decoded=new TextDecoder().decode(new Uint8Array(out));',
        'document.open();document.write(decoded);document.close();',
        '})();'
      ].join('\n');

      var srcdocHtml = [
        '<!DOCTYPE html><html><head>',
        '<meta name="viewport" content="width=1280,initial-scale=0.35,minimum-scale=0.1,maximum-scale=5.0,user-scalable=yes">',
        '</head><body>',
        '<script>' + assemblerScript + '<\/script>',
        '</body></html>'
      ].join('');

      mainUI.style.display = 'none';
      frame.style.display  = 'block';
      frame.srcdoc = srcdocHtml;

    } catch(err) {
      setP(0, '');
      progArea.classList.remove('active');
      showErr(err.message);
    }
  }
})();
</script>
</body>
</html>
