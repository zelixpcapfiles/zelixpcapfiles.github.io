
<style>

<div class="wrap">

<script>
const ALL_LAYERS=['l-compact','l-vars','l-strenc','l-strcat','l-numenc','l-fnalias','l-xor','l-arr','l-dead','l-flow','l-junkfn','l-selfref','l-chr','l-heredoc','l-eval'];
const C='abcdefghijklmnopqrstuvwxyz';
const R=n=>{let s='_'+C[r(26)];for(let i=1;i<n;i++)s+=C[r(26)];return s;};
const r=n=>Math.floor(Math.random()*n);
const b64e=s=>{try{return btoa(unescape(encodeURIComponent(s)))}catch(e){return btoa(s)}};
const hexS=s=>s.split('').map(c=>'\\x'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
const rot13=s=>s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);});

const RESERVED=new Set(['this','self','parent','static','true','false','null','echo','print','return',
  'if','else','elseif','while','for','foreach','do','switch','case','break','continue','default',
  'class','function','new','array','list','isset','empty','unset','die','exit','include','require',
  'include_once','require_once','use','namespace','abstract','interface','extends','implements',
  'public','private','protected','final','const','try','catch','throw','finally','match','fn',
  'yield','global','GLOBALS','_SERVER','_GET','_POST','_FILES','_COOKIE','_SESSION','_REQUEST','_ENV']);

const PHP_FNS=['strlen','strpos','str_replace','substr','strtolower','strtoupper','trim','ltrim','rtrim',
  'str_pad','str_repeat','str_split','str_word_count','strcmp','strcasecmp','strncmp','strrev',
  'array_merge','array_map','array_keys','array_values','array_push','array_pop','array_shift',
  'array_unshift','array_slice','array_splice','array_search','array_flip','array_unique',
  'array_reverse','array_count_values','array_fill','array_chunk','array_combine','array_diff',
  'in_array','explode','implode','join','count','sizeof','sort','rsort','asort','arsort','ksort',
  'preg_match','preg_replace','preg_split','preg_match_all',
  'json_encode','json_decode','serialize','unserialize',
  'file_get_contents','file_put_contents','fopen','fclose','fread','fwrite','file_exists',
  'is_array','is_string','is_numeric','is_int','is_float','is_null','is_object','is_bool',
  'intval','floatval','strval','boolval','settype','gettype',
  'printf','sprintf','fprintf','number_format','abs','ceil','floor','round','max','min','pow','sqrt',
  'htmlspecialchars','htmlentities','strip_tags','addslashes','stripslashes','nl2br',
  'md5','sha1','crc32','hash','base64_encode','base64_decode','str_rot13','urlencode','urldecode',
  'date','time','mktime','strtotime','microtime','sleep','usleep',
  'header','session_start','setcookie','ob_start','ob_end_clean','ob_get_clean',
  'class_exists','method_exists','function_exists','property_exists','get_class','is_a',
  'array_key_exists','array_keys','array_pop','array_push'];

// ── L1: Compact
function doCompact(code){
  return code
    .replace(/\/\/[^\n]*/g,'')
    .replace(/#[^\n]*/g,'')
    .replace(/\/\*[\s\S]*?\*\//g,'')
    .replace(/[ \t]+/g,' ')
    .replace(/\n\s*\n+/g,'\n')
    .trim();
}

// ── L2: Rename vars
function doRenameVars(code){
  const map={};
  const re=/\$([a-zA-Z_][a-zA-Z0-9_]*)/g;
  let m;
  while((m=re.exec(code))!==null){
    const v=m[1];
    if(!RESERVED.has(v.toLowerCase())&&!map[v])
      map[v]=R(10+r(5));
  }
  let res=code;
  for(const[o,n] of Object.entries(map))
    res=res.replace(new RegExp('\\$'+o.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','g'),'$'+n);
  return res;
}

// ── L3: Encode strings
function doEncStrings(code){
  return code
    .replace(/'([^'\\]*)'/g,(match,s)=>{
      if(!s||s.startsWith('\\x'))return match;
      const c=r(3);
      if(c===0)return 'base64_decode("'+b64e(s)+'")';
      if(c===1)return '"'+hexS(s)+'"';
      return 'str_rot13("'+rot13(s)+'")';
    })
    .replace(/"([^"\\]*)"/g,(match,s)=>{
      if(!s||s.startsWith('\\x')||s.length<3)return match;
      return 'base64_decode("'+b64e(s)+'")';
    });
}

// ── L4: Split & concat strings
function doSplitStr(code){
  return code.replace(/'([^'\\]{5,})'/g,(match,s)=>{
    const parts=[];let i=0;
    while(i<s.length){const l=2+r(4);parts.push("'"+s.slice(i,i+l)+"'");i+=l;}
    return parts.length>1?'('+parts.join('.')+')':"'"+s+"'";
  });
}

// ── L5: Encode numbers
function doEncNums(code){
  return code.replace(/(?<!['\"\.\$>a-zA-Z_])(\b\d+\b)(?!['\"a-zA-Z_])/g,(match,num)=>{
    const n=parseInt(num,10);
    if(isNaN(n)||n<0||n>9999)return match;
    const c=r(4);
    if(c===0)return'0x'+n.toString(16).toUpperCase();
    if(c===1&&n>0)return'0'+n.toString(8).padStart(2,'0');
    if(c===2){const a=r(Math.max(1,n))+1;const b=n-a;return b>=0?'('+a+'+'+b+')':'('+a+'-'+Math.abs(b)+')';}
    if(c===3&&n>1){const a=r(n-1)+1;const b=n-a;return'('+a+'+'+b+')';}
    return match;
  });
}

// ── L6: Function aliasing
function doFnAlias(code){
  const map={};const pre=[];
  for(const fn of PHP_FNS){
    const re=new RegExp('(?<![\'\"a-zA-Z0-9_$])'+fn+'\\s*\\(','g');
    if(re.test(code)){const v=R(9);map[fn]=v;pre.push('$'+v+'=\''+fn+'\';');}
  }
  let res=code;
  for(const[fn,v] of Object.entries(map)){
    const re=new RegExp('(?<![\'\"a-zA-Z0-9_$])'+fn+'\\s*\\(','g');
    res=res.replace(re,'$'+v+'(');
  }
  if(pre.length>0)res=res.replace(/(<\?php\s*)/i,'$1'+pre.join('')+' ');
  return res;
}

// ── L7: XOR encoding
function doXOR(code){
  // Encode beberapa string literal dengan XOR + tambahkan fungsi decoder
  const key=R(6);
  const keyBytes=key.split('').map(c=>c.charCodeAt(0));
  const decoderName=R(8);
  // decoder function dalam PHP
  const decoderFn=`function ${decoderName}($s,$k){$o='';$l=strlen($k);for($i=0;$i<strlen($s);$i++){$o.=chr(ord($s[$i])^ord($k[$i%$l]));}return $o;}`;

  let strCount=0;
  const res=code.replace(/'([^'\\]{4,30})'/g,(match,s)=>{
    if(strCount>8)return match; // limit agar tidak terlalu besar
    strCount++;
    // XOR the string
    let encoded='';
    for(let i=0;i<s.length;i++){
      encoded+=String.fromCharCode(s.charCodeAt(i)^keyBytes[i%keyBytes.length]);
    }
    try{
      const b=b64e(encoded);
      return `${decoderName}(base64_decode("${b}"),"${key}")`;
    }catch(e){return match;}
  });

  // inject decoder setelah <?php
  return res.replace(/(<\?php\s*)/i,'$1'+decoderFn+' ');
}

// ── L8: Array string table
function doArrTable(code){
  const arrName=R(9);
  const strMap=[];
  let idx=0;
  const res=code.replace(/'([^'\\]{3,})'/g,(match,s)=>{
    if(idx>30)return match;
    strMap.push(s);
    const i=idx++;
    return `$${arrName}[${i}]`;
  });
  if(strMap.length===0)return code;
  const arrDef=`$${arrName}=array(${strMap.map(s=>"'"+s.replace(/'/g,"\\'")+"'").join(',')});`;
  return res.replace(/(<\?php\s*)/i,'$1'+arrDef+' ');
}

// ── L9: Dead code
function makeDead(){
  const v1=R(6),v2=R(6),v3=R(6);
  const t=[
    `$${v1}=array(${r(999)},${r(999)},${r(999)});if(false){unset($${v1});}`,
    `if(false){$${v1}=null;$${v2}='';unset($${v1},$${v2});}`,
    `for($${v1}=0;$${v1}<0;$${v1}++){}`,
    `$${v1}=function()use(&$${v2}){return false;};if(false){$${v1}();}`,
    `try{if(false){throw new \\Exception('');}}catch(\\Exception $${v1}){}`,
    `$${v1}=0;while($${v1}<0){$${v1}++;}unset($${v1});`,
    `$${v1}=array_fill(0,0,'');if(count($${v1})>9999){}`,
    `if(0&&isset($${v1})){$${v2}=$${v3}=null;}`,
    `switch(false){case true:$${v1}=1;break;default:break;}`,
    `$${v1}=null;if(!is_null($${v2}=null)){$${v1}=false;}unset($${v1},$${v2});`,
  ];
  return t[r(t.length)];
}

// ── L10: Scramble flow
function doScramble(code){
  const lines=code.split('\n');const res=[];
  for(const l of lines){
    res.push(l);
    if(Math.random()<0.3)res.push(makeDead());
  }
  return res.join('\n');
}

// ── L11: Junk functions
function doJunkFns(code){
  const n=3+r(3);const fns=[];
  for(let i=0;i<n;i++){
    const fn=R(10);const p1=R(5),p2=R(5),p3=R(5);
    const v1=R(5),v2=R(5),v3=R(5),v4=R(5);
    fns.push(
      `function ${fn}($${p1}=null,$${p2}=0,$${p3}=false){`+
      `$${v1}=array();$${v2}=0;$${v3}='';`+
      `if($${p3}===true&&false){return $${p1};}` +
      `while($${v2}<0){$${v2}++;$${v3}.=chr($${v2});}` +
      `if(isset($${p1})&&$${p1}===PHP_INT_MAX){foreach($${v1} as $${v4}=>&$${v2}){$${v2}=null;}}` +
      `return null;}`
    );
  }
  const stripped=code.replace(/<\?php\s*/i,'').replace(/\?>\s*$/,'');
  return '<?php\n'+fns.join('\n')+'\n'+stripped+(stripped.trim().endsWith('?>')?'':'\n?>');
}

// ── L12: Self-referential vars
function doSelfRef(code){
  const pre=[];const n=3+r(3);
  const names=[];
  for(let i=0;i<n;i++){const v=R(8);names.push(v);}
  for(let i=0;i<names.length;i++){
    const next=names[(i+1)%names.length];
    pre.push(`$${names[i]}='$${next}';`);
  }
  return code.replace(/(<\?php\s*)/i,'$1'+pre.join('')+' ');
}

// ── L13: chr() encoding
function doChrEnc(code){
  return code.replace(/'([^'\\]{1,12})'/g,(match,s)=>{
    if(r(3)!==0)return match; // encode ~33% of short strings
    return '('+s.split('').map(c=>'chr('+c.charCodeAt(0)+')').join('.')+')';
  });
}

// ── L14: Heredoc injection (safe nowdoc-style untuk string statis)
function doHeredoc(code){
  // Ganti beberapa string literal menjadi nowdoc (tidak perlu escape)
  let count=0;
  return code.replace(/'([^'\\]{10,50})'/g,(match,s)=>{
    if(count>=3||r(3)!==0)return match;
    count++;
    const lbl='LBL'+R(5).toUpperCase().replace('_','');
    // Nowdoc: <<<'LBL'\n...\nLBL
    // Tapi nowdoc tidak bisa inline ekspresi, jadi gunakan variabel temp
    // Kita wrap dalam ekspresi yang tetap valid
    return "<<<'"+lbl+"'\n"+s+"\n"+lbl;
  });
}

// ── L15: Double eval wrapper
function doEvalWrap(code){
  const stripped=code.replace(/<\?php\s*/i,'').replace(/\?>\s*$/,'').trim();
  const enc1=b64e(stripped);
  const enc2=b64e(enc1);
  const v1=R(9),v2=R(9),v3=R(9),v4=R(9),v5=R(9);
  // Pecah 'base64_decode' dan 'eval' jadi concat agar tidak tertangkap static scanner
  return `<?php\n`+
    `$${v1}='bas'.'e6'.'4_d'.'ec'.'ode';\n`+
    `$${v2}='ev'.'al';\n`+
    `$${v3}="${enc2}";\n`+
    `$${v4}=$${v1}($${v3});\n`+
    `$${v5}=$${v1}($${v4});\n`+
    `@$${v2}($${v5});\n`+
    `?>`;
}

// ── Main
function run(){
  const inp=document.getElementById('inp').value.trim();
  if(!inp){setStat('Masukkan kode PHP.');return;}
  setStat('Memproses...');
  setTimeout(()=>{
    try{
      const l=id=>document.getElementById(id).checked;
      let c=inp;
      if(l('l-compact'))c=doCompact(c);
      if(l('l-fnalias'))c=doFnAlias(c);
      // Array table sebelum string encoding agar string asli ter-map
      if(l('l-arr'))c=doArrTable(c);
      if(l('l-xor'))c=doXOR(c);
      if(l('l-vars'))c=doRenameVars(c);
      if(l('l-strcat'))c=doSplitStr(c);
      if(l('l-chr'))c=doChrEnc(c);
      if(l('l-strenc'))c=doEncStrings(c);
      if(l('l-numenc'))c=doEncNums(c);
      if(l('l-selfref'))c=doSelfRef(c);
      if(l('l-flow')&&l('l-dead'))c=doScramble(c);
      else if(l('l-dead')){
        const ls=c.split('\n');const rs=[];
        for(const line of ls){rs.push(line);if(Math.random()<0.2)rs.push(makeDead());}
        c=rs.join('\n');
      }
      if(l('l-junkfn'))c=doJunkFns(c);
      // Heredoc SEBELUM eval wrap (heredoc tidak bisa ada di dalam string base64)
      // Dinonaktifkan sebelum eval agar tidak merusak
      // if(l('l-heredoc'))c=doHeredoc(c); // only without eval
      if(l('l-eval'))c=doEvalWrap(c);
      else if(l('l-heredoc'))c=doHeredoc(c);

      document.getElementById('out').value=c;
      const act=ALL_LAYERS.filter(id=>document.getElementById(id).checked).length;
      const grow=((c.length/inp.length-1)*100).toFixed(0);
      document.getElementById('stats').innerHTML=
        `<span class="pill">Selesai</span>`+
        `<span class="pill">${inp.length} → ${c.length} char (+${grow}%)</span>`+
        `<span class="pill">${act}/15 layer aktif</span>`;
    }catch(e){
      setStat('Error: '+e.message);
      console.error(e);
    }
  },60);
}

function setStat(msg){document.getElementById('stats').innerHTML=`<span class="pill">${msg}</span>`;}

function doCopy(){
  const t=document.getElementById('out').value;
  if(!t)return;
  navigator.clipboard.writeText(t).then(()=>setStat('Disalin ke clipboard.'));
}
function doDownload(){
  const t=document.getElementById('out').value;
  if(!t)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));
  a.download='obfuscated.php';a.click();
  setStat('File diunduh.');
}
function doClear(){
  document.getElementById('inp').value='';
  document.getElementById('out').value='';
  setStat('Siap.');updateStrength();
}

// Strength meter
function updateStrength(){
  const bar=document.getElementById('sbar');
  bar.innerHTML='';
  const act=ALL_LAYERS.filter(id=>document.getElementById(id).checked).length;
  const lvl=act<=3?1:act<=6?2:act<=9?3:act<=12?4:5;
  const labels=['','Lemah','Sedang','Kuat','Sangat kuat','Maksimum'];
  for(let i=0;i<15;i++){
    const seg=document.createElement('div');
    seg.className='seg'+(i<act?' on-'+lvl:'');
    bar.appendChild(seg);
  }
  document.getElementById('slabel').textContent='Kekuatan: '+labels[lvl];
}
ALL_LAYERS.forEach(id=>document.getElementById(id).addEventListener('change',updateStrength));
updateStrength();
</script>
